name: CI

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node | ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test

      - name: Generate tag
        id: generate_tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: '218549829959.dkr.ecr.sa-east-1.amazonaws.com/project-ci-api'
          aws-region: sa-east-1

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      # - name: Login into the container registry
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME}}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: Build and Push
      #   uses: docker/build-push-action@v7
      #   with:
      #     push: true
      #     tags: lohanflores/project-ci-api:${{ steps.generate_tag.outputs.sha }}, lohanflores/project-ci-api:latest

          
      - name: Build docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.generate_tag.outputs.sha }}
        run: | 
          docker build -t $REGISTRY/project-ci-api:$TAG .
          docker push $REGISTRY/project-ci-api:$TAG
          
      # - name: Push image
      #   run: docker push lohanflores/project-ci-api:${{ steps.generate_tag.outputs.sha }}

      # - name: Push docker image
      #   run: docker push project-ci-api:latest
